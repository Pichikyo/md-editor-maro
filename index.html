<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>md Editor MARO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.2s, color 0.2s;
  }

  /* ── Dark ── */
  body.dark {
    background: #1e1e1e;
    color: #d4d4d4;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  body.dark header { background: #252525; border-bottom: 1px solid #333; }
  body.dark #editor { background: #1e1e1e; color: #9cdcfe; border-right: 1px solid #333; font-family: 'SF Mono', 'Menlo', monospace; }
  body.dark #preview { background: #1e1e1e; color: #d4d4d4; }
  body.dark #preview code, body.dark #preview pre { background: #2d2d2d; color: #ce9178; }
  body.dark #preview blockquote { border-color: #555; color: #888; }
  body.dark #preview hr { border-color: #333; }
  body.dark #preview h1, body.dark #preview h2, body.dark #preview h3 { color: #fff; }
  body.dark .theme-btn { color: #aaa; border-color: #444; background: #2a2a2a; }
  body.dark .theme-btn.active { background: #d4d4d4; color: #1e1e1e; border-color: #d4d4d4; }
  body.dark .copy-btn { background: #2a2a2a; color: #aaa; border-color: #444; }
  body.dark .copy-btn:hover { background: #333; }
  body.dark .label { color: #666; }

  /* ── Warm ── */
  body.warm {
    background: #f5f0e8;
    color: #3d2b1f;
    font-family: 'Georgia', 'Times New Roman', serif;
  }
  body.warm header { background: #ede8df; border-bottom: 1px solid #d9cfc0; }
  body.warm #editor { background: #f5f0e8; color: #6b4c3b; border-right: 1px solid #d9cfc0; font-family: 'SF Mono', 'Menlo', monospace; }
  body.warm #preview { background: #f5f0e8; font-family: 'Georgia', serif; line-height: 1.9; }
  body.warm #preview code, body.warm #preview pre { background: #e8e0d0; color: #6b4c3b; }
  body.warm #preview blockquote { border-color: #c4a882; color: #8a6a55; }
  body.warm #preview hr { border-color: #d9cfc0; }
  body.warm .theme-btn.active { background: #3d2b1f; color: #f5f0e8; border-color: #3d2b1f; }

  /* ── Notion ── */
  body.modern {
    background: #fff;
    color: #1a1a1a;
    font-family: -apple-system, 'Segoe UI', sans-serif;
  }
  body.modern header { background: #fff; border-bottom: 1px solid #efefef; }
  body.modern #editor { background: #fff; color: #444; border-right: 1px solid #efefef; font-family: 'SF Mono', 'Menlo', monospace; font-size: 13px; }
  body.modern #preview { background: #fff; max-width: none; }
  body.modern #preview code, body.modern #preview pre { background: #f6f6f6; }
  body.modern #preview blockquote { border-color: #ddd; color: #777; }
  body.modern #preview hr { border-color: #efefef; }
  body.modern .theme-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  /* ── 共通 ── */
  header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 10px 20px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .divider-v {
    width: 1px;
    height: 18px;
    background: #e0e0e0;
    margin: 0 4px;
  }

  body.dark .divider-v { background: #444; }

  .themes {
    display: flex;
    gap: 4px;
  }

  .theme-btn {
    padding: 5px 12px;
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    background: #fff;
    color: #444;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .theme-btn.active {
    background: #1a1a1a;
    color: #fff;
    border-color: #1a1a1a;
  }

  .copy-btn {
    padding: 5px 14px;
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    background: #fff;
    color: #444;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .copy-btn:hover { background: #f0f0f0; }
  .copy-btn.copied { color: #4caf50; border-color: #4caf50; }

  .label {
    font-size: 11px;
    color: #aaa;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  #divider {
    width: 5px;
    cursor: col-resize;
    background: transparent;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #divider:hover, #divider:active { background: rgba(128,128,128,0.3); }

  #editor-wrap {
    width: calc(50% - 5px);
    height: 100%;
    position: relative;
  }

  #editor {
    width: 100%;
    height: 100%;
    padding: 32px;
    border: none;
    outline: none;
    resize: none;
    font-size: 14px;
    line-height: 1.8;
  }

  #preview {
    width: calc(50% - 5px);
    height: 100%;
    padding: 32px 40px;
    overflow-y: auto;
  }

  #preview h1, #preview h2, #preview h3 {
    margin: 1.5em 0 0.5em;
    line-height: 1.3;
  }
  #preview h1 { font-size: 26px; }
  #preview h2 { font-size: 20px; }
  #preview h3 { font-size: 17px; }
  #preview p { margin: 0.8em 0; line-height: 1.8; }
  #preview ul, #preview ol { margin: 0.8em 0; padding-left: 1.5em; line-height: 1.8; }
  #preview code { padding: 2px 6px; border-radius: 4px; font-family: 'SF Mono', 'Menlo', monospace; font-size: 13px; }
  #preview pre { padding: 16px; border-radius: 8px; overflow-x: auto; margin: 1em 0; }
  #preview pre code { background: none; padding: 0; }
  #preview blockquote { border-left: 3px solid; padding-left: 16px; margin: 1em 0; }
  #preview hr { border: none; border-top: 1px solid; margin: 2em 0; }
  #preview a { color: #0066cc; }

  #preview table {
    border-collapse: collapse;
    width: 100%;
    margin: 1em 0;
    font-size: 14px;
  }
  #preview th, #preview td {
    border: 1px solid #ddd;
    padding: 8px 14px;
    text-align: left;
  }
  #preview th {
    background: #f0f0f0;
    font-weight: 600;
  }
  #preview tr:nth-child(even) { background: #f9f9f9; }

  body.dark #preview th { background: #2d2d2d; }
  body.dark #preview th, body.dark #preview td { border-color: #444; }
  body.dark #preview tr:nth-child(even) { background: #252525; }

  body.warm #preview th { background: #e8e0d0; }
  body.warm #preview th, body.warm #preview td { border-color: #d9cfc0; }
  body.warm #preview tr:nth-child(even) { background: #f0ece4; }

  body.modern #preview th { background: #f6f6f6; }
  body.modern #preview th, body.modern #preview td { border-color: #efefef; }
  body.modern #preview tr:nth-child(even) { background: #fafafa; }

  #editor-wrap {
    position: relative;
    width: calc(50% - 5px);
    height: 100%;
  }
  #editor-wrap #editor { width: 100%; }
  #editor-hl {
    position: absolute;
    left: 0; right: 0;
    background: rgba(255, 200, 0, 0.25);
    pointer-events: none;
    display: none;
    border-radius: 2px;
    transition: opacity 0.3s;
  }
</style>
</head>
<body class="modern">

<header>
  <div class="label">md Editor MARO</div>
  <div class="header-actions">
    <div class="themes">
      <button class="theme-btn active" onclick="setTheme('modern', this)">Light</button>
      <button class="theme-btn" onclick="setTheme('warm', this)">Warm</button>
      <button class="theme-btn" onclick="setTheme('dark', this)">Dark</button>
    </div>
    <div class="divider-v"></div>
    <button class="copy-btn" onclick="copyMd()">Copy MD</button>
    <button class="copy-btn" onclick="downloadMd()">Download MD</button>
    <button class="copy-btn" onclick="clearEditor()">Clear</button>
  </div>
</header>

<main id="main">
  <div id="editor-wrap">
    <textarea id="editor" placeholder="ここにMarkdownを書く..."></textarea>
    <div id="editor-hl"></div>
  </div>
  <div id="divider"></div>
  <div id="preview"></div>
</main>

<script>
  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const divider = document.getElementById('divider');
  const main = document.getElementById('main');
  const editorWrap = document.getElementById('editor-wrap');
  const editorHl = document.getElementById('editor-hl');
  let editorHlTimer = null;

  let lastRenderedHTML = '';

  function render() {
    lastRenderedHTML = marked.parse(editor.value);
    preview.innerHTML = lastRenderedHTML;
  }

  editor.addEventListener('input', () => {
    render();
    sessionStorage.setItem('maro-editor-content', editor.value);
  });

  // リロード後に内容を復元
  const saved = sessionStorage.getItem('maro-editor-content');
  if (saved) { editor.value = saved; render(); }

  function setTheme(theme, btn) {
    document.body.className = theme;
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function clearEditor() {
    if (!confirm('内容を消去しますか？')) return;
    editor.value = '';
    preview.innerHTML = '';
    lastRenderedHTML = '';
    sessionStorage.removeItem('maro-editor-content');
  }

  function downloadMd() {
    const blob = new Blob([editor.value], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'document.md';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function copyMd() {
    navigator.clipboard.writeText(editor.value);
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy MD';
      btn.classList.remove('copied');
    }, 1500);
  }

  // ① ドラッグ＆ドロップでmdファイルを開く
  main.addEventListener('dragover', (e) => { e.preventDefault(); });
  main.addEventListener('drop', (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        editor.value = ev.target.result;
        render();
      };
      reader.readAsText(file, 'UTF-8');
    }
  });

  // ② 選択テキスト同期
  let syncLock = false;

  function highlightInPreview(text) {
    preview.innerHTML = lastRenderedHTML;
    if (!text || text.length < 2) return;
    const walker = document.createTreeWalker(preview, NodeFilter.SHOW_TEXT);
    let node;
    while (node = walker.nextNode()) {
      const idx = node.nodeValue.indexOf(text);
      if (idx !== -1) {
        try {
          const range = document.createRange();
          range.setStart(node, idx);
          range.setEnd(node, idx + text.length);
          const mark = document.createElement('mark');
          mark.style.cssText = 'background:rgba(255,200,0,0.4);border-radius:2px;padding:0;';
          range.surroundContents(mark);
          mark.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } catch(e) {}
        break;
      }
    }
  }

  function selectInEditor(text) {
    if (!text || text.length < 2) return;
    const idx = editor.value.indexOf(text);
    if (idx === -1) return;
    const before = editor.value.substring(0, idx);
    const linesBefore = before.split('\n').length - 1;
    const linesInText = text.split('\n').length - 1;
    const lineHeight = parseFloat(getComputedStyle(editor).lineHeight) || 24;
    const paddingTop = parseFloat(getComputedStyle(editor).paddingTop) || 32;
    editor.scrollTop = Math.max(0, (linesBefore - 3) * lineHeight);
    const top = paddingTop + linesBefore * lineHeight - editor.scrollTop;
    const height = (linesInText + 1) * lineHeight;
    editorHl.style.top = top + 'px';
    editorHl.style.height = height + 'px';
    editorHl.style.display = 'block';
    editorHl.style.opacity = '1';
    clearTimeout(editorHlTimer);
    editorHlTimer = setTimeout(() => { editorHl.style.opacity = '0'; setTimeout(() => { editorHl.style.display = 'none'; }, 300); }, 2000);
  }

  editor.addEventListener('mouseup', () => {
    if (syncLock) return;
    const sel = editor.value.substring(editor.selectionStart, editor.selectionEnd).trim();
    if (sel.length >= 2) {
      syncLock = true;
      highlightInPreview(sel);
      setTimeout(() => { syncLock = false; }, 100);
    } else {
      preview.innerHTML = lastRenderedHTML;
    }
  });

  editor.addEventListener('keyup', (e) => {
    if (!e.shiftKey || syncLock) return;
    const sel = editor.value.substring(editor.selectionStart, editor.selectionEnd).trim();
    if (sel.length >= 2) {
      syncLock = true;
      highlightInPreview(sel);
      setTimeout(() => { syncLock = false; }, 100);
    }
  });

  preview.addEventListener('mouseup', () => {
    if (syncLock) return;
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) {
      editorHl.style.opacity = '0';
      setTimeout(() => { editorHl.style.display = 'none'; }, 300);
      return;
    }
    const text = sel.toString().trim();
    if (text.length >= 2) {
      syncLock = true;
      selectInEditor(text);
      setTimeout(() => { syncLock = false; }, 100);
    }
  });

  // ③ ドラッグで仕切りを左右に動かす
  let dragging = false;
  divider.addEventListener('mousedown', (e) => {
    dragging = true;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const rect = main.getBoundingClientRect();
    let ratio = (e.clientX - rect.left) / rect.width * 100;
    ratio = Math.max(10, Math.min(90, ratio));
    editorWrap.style.width = ratio + '%';
    preview.style.width = (100 - ratio) + '%';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
</script>
</body>
</html>
